<!DOCTYPE html>
<html lang="en" data-theme="a">

<head>
  <title>Paul</title>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <meta name='theme-color' content='#0d0c0b'>

  <link href='css/fashion.css' rel='stylesheet' type='text/css'>
  <link rel='icon' href='favicon5.png' />

  <!-- pick a theme at random before paint -->
  <script>(function(){var k=['a','b','c','d','e','f'];document.documentElement.setAttribute('data-theme',k[Math.floor(Math.random()*k.length)])})();</script>

  <!-- Google Analytics -->
  <script src='js/analytics.js'></script>
</head>

<body>
  <div class="picker" role="group" aria-label="theme">
      <button data-set="a" aria-label="theme 1"></button>
      <button data-set="b" aria-label="theme 2"></button>
      <button data-set="c" aria-label="theme 3"></button>
      <button data-set="d" aria-label="theme 4"></button>
      <button data-set="e" aria-label="theme 5"></button>
      <button data-set="f" aria-label="theme 6"></button>
  </div>

  <header class="nav wrap">
    <div class="links">
      <span class="me">pmoulton@</span>
      <a href='https://notblonded.com/' class='here'>film</a>
      <a href='https://paulmoultn.com/cafes'>coffee</a>
      <a href='https://paulmoultn.com/restaurants'>food</a>
      <a href='https://github.com/pmoulton/efficiency' class='here'>computing</a>
    </div>
  </header>

  <main class="content wrap">
    <h3>enjoys</h3>
    <p class="body">brutalist architecture, tokyo metro, solarized color theme, caffeine, rainy days</p>
    <h3>work history</h3>
    <p class="hist">
      <b>pmoulton @ google.com</b>&nbsp;&nbsp;<span>2020 — now</span><br>
      <b>pmoulton @ fb.com</b>&nbsp;&nbsp;<span>2016 — 2020</span><br>
      <b>pmoulton @ berkeley.edu</b>&nbsp;&nbsp;<span>2013 — 2017</span>
    </p>
  </main>

  <div class="footer"><i></i><i></i><i></i><i></i><i></i></div>

  <script>
    (function(){
      var root=document.documentElement;
      var btns=[].slice.call(document.querySelectorAll('.picker button'));
      function set(t){
        root.setAttribute('data-theme',t);
        btns.forEach(function(b){b.setAttribute('aria-current', b.dataset.set===t)});
      }
      btns.forEach(function(b){b.addEventListener('click',function(){set(b.dataset.set)})});
      set(root.getAttribute('data-theme'));   /* sync picker to the random pick */
    })();
  </script>
</body>

</html>
